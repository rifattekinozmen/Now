services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - '${DOCKER_HTTP_PORT:-8080}:80'
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - now

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-now}
      DB_USERNAME: ${DB_USERNAME:-now}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - now

  mysql:
    image: mysql:8.0
    ports:
      - '${DOCKER_MYSQL_PORT:-33061}:3306'
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-now}
      MYSQL_USER: ${DB_USERNAME:-now}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - now-mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - now

  redis:
    image: redis:7-alpine
    ports:
      - '${DOCKER_REDIS_PORT:-63790}:6379'
    volumes:
      - now-redis-data:/data
    networks:
      - now

networks:
  now:
    driver: bridge

volumes:
  now-mysql-data:
  now-redis-data:
